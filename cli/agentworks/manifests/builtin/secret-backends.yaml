# Built-in secret backends: named instantiations of the built-in
# providers, shipped as app data so the framework treats them like any
# other resource (origin: built-in, reserved names).
apiVersion: agentworks/v1
kind: secret-backend
metadata:
    name: env-var
    description: Reads AW_SECRET_<NAME> from the operator's environment
spec:
    provider: env-var
---
apiVersion: agentworks/v1
kind: secret-backend
metadata:
    name: prompt
    description: Prompts interactively, once per missing secret per invocation
spec:
    provider: prompt
