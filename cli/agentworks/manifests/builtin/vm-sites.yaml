# The zero-config built-in sites: one per platform that works with no
# settings. Bundling these (rather than letting VMs reference the
# vm-platform capability directly) keeps vms.site one uniform reference
# space: every VM points at a vm-site, never sometimes at a capability.
# Their names are reserved unconditionally -- a pre-finalize check in
# bootstrap.build_registry rejects operator declarations even on hosts
# where the bundled row is gated out (builtin_override = "reserved"
# backstops the published case): customize by declaring a sibling site,
# not by redeclaring these.
#
# A bundled site publishes ONLY where its platform says the zero-config
# site is viable (VMPlatform.bundled_site_unsupported_reason: lima-local
# needs a local limactl; wsl2 needs Windows with WSL). The skip
# predicate composes in bootstrap.build_registry; `agw doctor` lists
# each installed platform's state and reason. The lima site is named
# lima-local, not lima: the bundled site is one CONFIGURATION of the
# platform (this workstation), and remote-Lima sites are ordinary
# operator declarations.
apiVersion: agentworks/v1
kind: vm-site
metadata:
  name: lima-local
  description: Local Lima VMs on this workstation
spec:
  platform: lima
---
apiVersion: agentworks/v1
kind: vm-site
metadata:
  name: wsl2
  description: WSL2 distros on this Windows workstation
spec:
  platform: wsl2
