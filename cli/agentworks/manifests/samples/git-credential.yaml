## kind: git-credential -- how to obtain a git token. Referenced by
## name from the admin template and agent templates. The token comes
## from a secret (default name `git-token-<name>`) resolved through the
## backend chain at VM-init time.
##
#apiVersion: agentworks/v1
#kind: git-credential
#metadata:
#  name: github
#  description: GitHub full access
#spec:
#  provider: github
##
## Azure DevOps needs the organization:
##
#---
#apiVersion: agentworks/v1
#kind: git-credential
#metadata:
#  name: azdo
#  description: Azure DevOps for my-org
#spec:
#  provider: azdo
#  provider_config:
#    org: my-org
##
## GitHub credentials can be scoped (fine-grained PATs): `repo` pins a
## credential to one repository, `owner` covers every repo under a
## user/org -- including repos cloned ad hoc. Unscoped credentials are
## the fallback. Git itself selects the right one per remote.
##
#---
#apiVersion: agentworks/v1
#kind: git-credential
#metadata:
#  name: widgets-bot
#  description: Fine-grained PAT for acme/widgets
#spec:
#  provider: github
#  provider_config:
#    repos: [acme/widgets]
