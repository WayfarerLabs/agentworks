## kind: git-credential -- how to obtain a git token. Referenced by
## name from the admin template and agent templates. The token comes
## from a secret (default name `git-token-<name>`) resolved through the
## backend chain at VM-init time.
##
#apiVersion: agentworks/v1
#kind: git-credential
#metadata:
#  name: github
#  description: GitHub full access
#spec:
#  provider: github
##
## Azure DevOps needs the organization:
##
#---
#apiVersion: agentworks/v1
#kind: git-credential
#metadata:
#  name: azdo
#  description: Azure DevOps for my-org
#spec:
#  provider: azdo
#  org: my-org
