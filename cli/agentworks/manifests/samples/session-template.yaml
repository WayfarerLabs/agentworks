## kind: session-template -- selects the harness that runs a session's workload.
## A session is a specification to run a specific harness as an agent in a
## workspace on a VM. The harness owns start/restart and the launch-target
## readiness check; `harness_config` is the blob it validates. An undeclared
## harness resolves to `shell` (a plain login shell), so a field-less template
## is still a login shell.
##
## `shell`'s config vocabulary is the legacy command fields, now nested:
##   command           -- the pane command (empty/omitted = login shell)
##   restart_command   -- used by `agw session restart`; falls back to command
##   required_commands -- executables checked on the launch target first
## Commands support the {{session_name}} and {{workspace_name}} variables.
## Env maps merge during inheritance (child wins); required_commands union.
##
#apiVersion: agentworks/v1
#kind: session-template
#metadata:
#  name: htop
#  description: Live process monitor
#spec:
#  harness: shell
#  harness_config:
#    command: htop
#    required_commands: [htop]
#  env:
#    TERM: xterm-256color
##
## The `claude-code` harness runs Claude Code as the session. It selects the
## launch/resume conventions with one line (harness: claude-code) instead of
## restating command strings: `session create` starts a new Claude session and
## `session restart` resumes the same conversation when its transcript still
## exists. `harness_config` is three optional fields:
##   permission_mode -- forwarded to `claude --permission-mode`
##   model           -- forwarded to `claude --model`
##   extra_args      -- raw argv tokens appended last (the escape hatch)
## The only launch-target requirement is that `claude` is installed.
##
#---
#apiVersion: agentworks/v1
#kind: session-template
#metadata:
#  name: claude
#  description: Claude Code session
#spec:
#  harness: claude-code
#  harness_config:
#    permission_mode: acceptEdits
#    model: opus
##
## See `agw resource kinds` for the harnesses available in your installation.
