## kind: secret-backend -- a named, configured instance of a secret
## provider (the raw capability). The built-in env-var and prompt
## backends ship with agentworks (their names are reserved); declare a
## backend only for config-bearing providers, and activate it by adding
## its name to [secret_config].backends in config.toml.
##
## No config-bearing provider ships yet, so there is nothing real to
## declare -- this sample is prose-only (nothing to uncomment).
## Illustrative shape for a future onepassword provider:
##
##   apiVersion: agentworks/v1
##   kind: secret-backend
##   metadata:
##     name: op-work
##     description: 1Password work vault
##   spec:
##     provider: onepassword
##     provider_config:
##       vault: Work
##
## A declarable example will land here when a config-bearing provider
## ships.
