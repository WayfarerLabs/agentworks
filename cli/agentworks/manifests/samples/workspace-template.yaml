## kind: workspace-template -- selected at `agw workspace create` time
## with --template; `default` applies when --template is omitted. Repo
## URLs use HTTPS; git credentials configured on the admin template
## provide authentication.
##
#apiVersion: agentworks/v1
#kind: workspace-template
#metadata:
#  name: myproject
#spec:
#  inherits: [default]
#  repo: https://github.com/org/myproject.git
#  tmuxinator: true
#  # Optional git identity stamped into the cloned repo (repo-local config,
#  # so it applies to any agent, the admin, or a human over VS Code Remote).
#  # Only takes effect when `repo` is set.
#  git_user_name: Ada Lovelace
#  git_user_email: ada@example.com
#  env:
#    REPO_REGION: us-east-1
