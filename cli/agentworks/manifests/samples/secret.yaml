## kind: secret -- a named secret that env tables reference via
## { secret = "<name>" } (TOML) or {secret: <name>} (YAML). Backends
## produce the value at command time; agentworks never persists it.
## `description` is required and shown in prompts and `agw doctor`;
## `hint` (optional) is shown alongside the prompt.
## `backend_mappings.<backend>` overrides that backend's identifier for
## this one secret, or opts out with `false`.
##
## Uncomment the document lines (delete one leading `#`) and edit.
##
#apiVersion: agentworks/v1
#kind: secret
#metadata:
#  name: npm-token
#  description: npm registry token
#spec:
#  hint: Generate at https://www.npmjs.com/settings/<user>/tokens
#  backend_mappings:
#    env-var: NPM_TOKEN
