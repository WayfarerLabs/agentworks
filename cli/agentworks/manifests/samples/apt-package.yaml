## kind: apt-package -- a named package set, optionally depending on
## apt-source entries. Referenced by name from vm-template
## `apt_packages`. Same name as a built-in catalog entry overrides it.
## The `apt_sources: [my-repo]` reference pairs with the apt-source
## sample -- declare that resource too (or drop the field) or loading
## will fail on the missing reference.
##
#apiVersion: agentworks/v1
#kind: apt-package
#metadata:
#  name: my-tool
#  description: My internal tool
#spec:
#  apt_sources: [my-repo]
#  apt: [my-tool]
