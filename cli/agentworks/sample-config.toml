# Agentworks configuration
# Copy to ~/.config/agentworks/config.toml and edit to match your setup.
#
# Required fields are uncommented. Everything else shows the default value
# commented out -- uncomment and change only what you need.
#
# Comment convention: examples are written as `#key = "value"` (no space
# after `#`), so you can uncomment a line in place by deleting one `#`.
# Prose comments use `# <text>` (with space). Pinned by tests in
# `cli/tests/test_sample_config.py`.
#
# Agentworks ships a built-in catalog of common tools (apt sources, apt
# packages, system install commands, user install commands). Run
# `agw resource list --kind apt-package,system-install-command,user-install-command,apt-source`
# to see what is available (or filter to any single kind). You can
# reference catalog entries by name in templates and define your own
# entries below to extend or override the catalog.
#
# Naming conventions:
#   - Framework keys (section names, field names) use snake_case:
#     [vm_templates.foo], ssh_public_key, mise_activate, backend_mappings.
#   - Operator-typed identifiers (entity names, backend kinds, secret names)
#     use kebab-case: [vm_templates.dev-host], `secret = "github-token"`,
#     `backends = ["env-var", "prompt"]`. The validator is permissive so
#     legacy names continue to load, but new names should follow kebab.

# =============================================================================
# Operator identity and platform settings
# =============================================================================

# --- Operator identity ---
# These settings identify you (the operator) to agentworks and your VMs.

[operator]
ssh_public_key = "~/.ssh/id_ed25519.pub"    # required: used to authorize access to VMs
ssh_private_key = "~/.ssh/id_ed25519"        # required: used for SSH connections to VMs
#ssh_config = "~/.ssh/config"               # SSH config file for VM host entries
#ssh_config_dir = true                      # manage VM entries in ~/.ssh/config.d/
#ssh_host_prefix = "awvm--"                 # prefix for VM SSH host aliases (e.g. awvm--myvm)
#ssh_agent_host_prefix = "awagent--"        # prefix for agent SSH host aliases (e.g. awagent--myagent)
#extra_ssh_public_keys = [                  # additional public keys for VM authorized_keys
#    "~/.ssh/other_key.pub",
#]

# --- Paths ---

[paths]
#vm_workspaces = "/opt/agentworks/workspaces"  # workspace directory on VMs
#vscode_workspaces = "~/aw-vscode-workspaces"   # .code-workspace file directory
#backups = "~/.config/agentworks/backups"       # vm backup directory

# --- Default values for CLI flags ---

[defaults]
#platform = "lima"                          # lima, azure, or wsl2
#vm_host = "mac-studio"                     # default VM host for remote Lima

# --- Named-console settings ---
# Scope: this section applies only to named multi-session consoles created
# via `agw console create`. The legacy `vm console` and the
# workspace-console template generator do NOT read these values.
#
# tmux_layout: layout applied to every multi-pane session window in a named
# console. Most values map 1:1 to tmux's built-in select-layout names so the
# same value can be applied on the fly via `tmux select-layout` key bindings;
# the `aw-session-vertical` value is an agentworks-specific layout computed
# per-window from live tmux dimensions. Re-read on every build / recreate /
# add-shell / restore-session, so changing this value and running
# `agw console attach <name> --recreate` (or adding/restoring a shell on a
# live console) is enough to switch layouts.

[named_console]
#tmux_layout = "aw-session-vertical"
# Valid values:
#   aw-session-vertical  - single column; session pane takes the top 50%
#                          and shell panes stack vertically in the bottom 50%
#                          with equal heights. The default -- this is the
#                          layout the Named Console feature was designed
#                          around (one privileged session pane, helper
#                          shells underneath).
#   tiled                - roughly-equal grid
#   even-vertical        - all panes as equal-height rows (one column)
#   even-horizontal      - all panes as equal-width columns (one row)
#   main-vertical        - session pane on the left, helper shells stacked right
#   main-horizontal      - session pane on top, helper shells laid out below
# The "main" layouts treat the first pane (the session attach itself) as
# the primary; the remaining shell panes become the secondary stack.

# --- Git credential providers ---
# Define how to obtain git tokens. Referenced by name in admin.config and
# agent_templates. Each entry's `token` field names a secret (default
# `git-token-<name>`) that the framework resolves through the backend chain
# (env-var, prompt, ...) at VM-init time; the resolved value is written to
# `~/.git-credentials` via git's credential-store helper.

#[git_credentials.github]
#type = "github"
#description = "GitHub full access"               # optional, shown in prompts and logs
#token = "git-token-github"                       # optional; default is `git-token-<name>` (bare secret name; no { secret = "..." } polymorphism)
# Resolved secret value is the PAT (create at https://github.com/settings/tokens, repo scope).

#[git_credentials.azdo]
#type = "azdo"
#org = "my-org"
#description = "Azure DevOps for my-org"          # optional, shown in prompts and logs
#token = "git-token-azdo"                         # optional; default is `git-token-<name>`
# Resolved secret value is the PAT (create at https://dev.azure.com/{org}/_usersSettings/tokens).

# --- Secrets ---
# A pluggable, named-secret system used by env tables on resources below.
# Anywhere a value can be a string, it can also be `{ secret = "<name>" }`,
# which references a declaration here. Backends produce the value at command
# time; agentworks never persists secret values to disk.
#
# Use `agw secret list` to see how each active backend would look up each
# declared secret. Use `agw secret describe <name>` for a full view including
# which env entries reference the secret (or `Referenced by: (none recorded)`
# for an unused declaration). `agw doctor` reports one row per secret with
# the runtime resolution outcome (ok / warn / fail).

# Secret declarations -- one per `{ secret = "<name>" }` reference used anywhere
# in your config. `description` is required and shown in prompts and
# `agw doctor`; `hint` (optional) is shown alongside the prompt.
# `backend_mappings.<kind>` (optional) overrides that backend's default
# identifier for this one secret, or sets `false` to opt out of that backend
# entirely.

#[secrets.npm-token]
#description = "npm registry token"
#hint = "Generate at https://www.npmjs.com/settings/<user>/tokens"

#[secrets.openai-api-key]
#description = "OpenAI API key"
#backend_mappings.env-var = "OPENAI_API_KEY"    # override default convention

# Backend declarations. Backends are activated by listing them in
# `[secret_config].backends` in precedence order. Currently implemented kinds:
# `env-var`, `prompt`.

#[secret_backends.env-var]
# Reads from process env. Default convention is AW_SECRET_<UPPER_SNAKE_CASE>,
# so secret "npm-token" reads from AW_SECRET_NPM_TOKEN unless overridden via
# `[secrets.<name>].backend_mappings.env-var`.

#[secret_backends.prompt]
# Interactive prompt. Always applies; the operator is asked once per missing
# secret per CLI invocation (batched at the start where possible).

#[secret_config]
#backends = ["env-var", "prompt"]    # the default chain; explicit configuration overrides.
# Backends declared above but absent from this list are dormant. Order is
# resolution precedence: the first backend that produces a value wins. An
# explicit empty list `backends = []` disables resolution entirely.

# --- Azure settings (only needed for --platform azure) ---

#[azure]
#subscription_id = "..."                    # required for azure platform
#resource_group = "agentworks-vms"          # required for azure platform
#region = "eastus2"                         # required for azure platform

# --- Proxmox settings (only needed for --platform proxmox) ---

#[proxmox]
#api_url = "https://pve.example.com:8006"   # required: Proxmox API URL
#node = "pve"                                # required: Proxmox node name
#token_id = "agentworks@pam!agentworks"      # required: API token ID
#template_vmid = 9000                        # required: VMID of Debian 12 cloud-init template
#storage = "local-lvm"                       # target storage for cloned disks
#bridge = "vmbr0"                            # network bridge
#pool = "agentworks"                         # Proxmox resource pool for VMs
#verify_ssl = true                           # verify TLS certificate
# Token secret: set PROXMOX_TOKEN_SECRET environment variable

# =============================================================================
# Templates
# =============================================================================
#
# Agentworks uses templates for VMs, workspaces, agents, and tasks. Each
# template type supports a "default" entry used when --template is not
# specified. Templates support inheritance via the "inherits" key:
# child values override parents, depth-first left-to-right.
#
# Each resource type below has an optional `.env` table next to its
# definition for environment variable overrides. Env tables merge in this
# precedence order (highest wins; identity vars win over everything):
#
#     session > (agent | admin) > workspace > vm    (AGENTWORKS_* overrides all)
#
# Admin and agent scopes are mutually exclusive: a shell opened as the admin
# user (e.g. `agw vm shell`) sees admin scope; an agent-mode session sees
# agent scope. Each env-table key is either a plaintext string or an inline
# `{ secret = "<name>" }` reference to a declaration in the "Secrets"
# section above. Use `agw env show` to preview the merged value at any scope.

# --- VM templates ---
# System-level VM configuration: hardware resources, system packages, and
# system-wide tools. Selected at vm create time with --template.
#
# Agentworks always installs system packages (git, tmux, tmuxinator, acl, jq,
# unzip) during init, in addition to provisioning packages (openssh-server,
# curl, sudo, ca-certificates, gnupg) installed at VM create time.

[vm_templates.default]
# -- Provisioning (set once at create time) --
#cpus = 4                                   # number of CPUs (Lima)
#memory = 8                                 # memory in GiB (Lima)
#azure_vm_size = "Standard_B2s"             # Azure VM size (determines cpu and memory for Azure)
#disk = 50                                  # disk size in GiB
#swap = 4                                   # swap file size in GiB (0 to disable)
# -- Provisioning-time secret references --
# Name of the secret declaration whose value is used as the Tailscale
# auth key during `vm create` / `vm reinit`. Default: "tailscale-auth-key".
# Resolved via the framework's backend chain (operator-declared
# [secrets.<name>] or auto-declared via miss policy). Bare string only;
# no { secret = "..." } polymorphism.
#tailscale_auth_key = "tailscale-auth-key"
# -- System-wide initialization (applied on create and reinit) --
#apt = [                                    # direct apt packages
#    "zsh",
#    "unzip",
#    "build-essential",
#    "ripgrep",
#    "fzf",
#    "fd-find",
#]
#apt_packages = ["gh", "docker"]            # named apt package sets from catalog
#snap = []                                  # direct snap packages
#system_install_commands = ["az-cli"]       # system-level commands from catalog

#[vm_templates.heavy]
#inherits = ["default"]
#cpus = 16
#memory = 64
#disk = 200

#[vm_templates.default.env]
#HTTP_PROXY = "http://proxy:3128"            # plaintext
#NPM_TOKEN = { secret = "npm-token" }        # secret reference (see Secrets section above)

# --- Admin user configuration ---
# Per-user settings for the admin (operator) user on VMs. Applied during
# init/reinit. This is not a template; there is one admin config.

#[admin.config]
#username = "agentworks"                    # admin username on VMs (default: agentworks)
#shell = "bash"                             # admin shell (default: bash, matches Debian's user-default; "zsh" also supported)
#git_credentials = ["github"]              # git credential providers to configure
#user_install_commands = ["bun"]             # per-user commands from catalog
# -- Dotfiles (source refs: local path or git::, see docs/guides/source-refs.md) --
#dotfiles_source = "git::https://github.com/user/dotfiles"
#dotfiles_destination = "~/.dotfiles"       # where to put them on the VM
#dotfiles_install_cmd = "./install.sh"      # command to run after clone/copy
# -- Mise (see docs/guides/mise.md) --
#mise_activate = true                       # add mise activate to shell profile
#mise_packages = ["terraform@1.14.5", "adr-tools@3.0.0"]  # name@version tool declarations
#mise_lockfile = "~/.config/agentworks/mise.lock"   # source ref (wins over dotfiles)
#mise_allow_unlocked = false                # install packages not in lockfile (with warning)
#mise_install_before = "7d"                 # reject versions newer than this
#mise_prune_on_reinit = true                # remove stale tool versions on reinit
# -- Git --
#git_force_safe_directory = true              # set safe.directory '*' for admin and agents
# -- Claude Code (requires claude CLI on PATH, e.g. via user_install_commands) --
#claude_marketplaces = ["https://github.com/WayfarerLabs/nerftools#4.1.0"]
#claude_plugins = ["nerftools-default@nerftools"]

#[admin.env]
#EDITOR = "nvim"

# --- Agent templates ---
# Per-user settings for agent users. Selected at agent create time with
# --template. Agents default to nothing unless explicitly configured.

#[agent_templates.default]
#shell = "bash"                             # agent shell (default: bash)
#git_credentials = []                       # git credential providers (default: none)
#user_install_commands = []                 # per-user commands from catalog
# -- Dotfiles --
#dotfiles_source = "git::https://github.com/user/agent-dotfiles"
#dotfiles_destination = "~/.dotfiles"
#dotfiles_install_cmd = "./install.sh"
# -- Mise --
#mise_activate = true                       # add mise activate to agent shell profile
#mise_packages = ["terraform@1.14.5"]              # name@version tool declarations
#mise_lockfile = "~/.config/agentworks/agent-mise.lock"
#mise_allow_unlocked = false
#mise_install_before = "7d"
#mise_prune_on_reinit = true
# -- Claude Code (requires claude CLI on PATH, e.g. via user_install_commands) --
#claude_marketplaces = ["https://github.com/WayfarerLabs/nerftools#4.1.0"]
#claude_plugins = ["nerftools-default@nerftools"]

#[agent_templates.restricted]
#inherits = ["default"]
#user_install_commands = []
#mise_packages = []

#[agent_templates.default.env]
#OPENAI_API_KEY = { secret = "openai-api-key" }

# --- Workspace templates ---
# Selected at workspace create time with --template. The "default" template
# is used when --template is not specified.
#
# Repo URLs: use HTTPS format. Git credentials configured in admin.config
# provide authentication via personal access tokens. Public repos work
# without credentials.

#[workspace_templates.default]
#repo = "https://github.com/org/repo.git"  # git repo to clone into workspace
#tmuxinator = true                          # generate tmuxinator config
#inherits = []                              # list of parent template names

#[workspace_templates.myproject]
#repo = "https://github.com/org/myproject.git"
#tmuxinator = false
#inherits = ["default"]

#[workspace_templates.default.env]
#REPO_REGION = "us-east-1"

# --- Session templates ---
# Define commands that sessions can run. The built-in "default" template runs a
# login shell. Templates support inheritance via "inherits".
#
# Template commands support {{session_name}} and {{workspace_name}} variables,
# using double-brace syntax.
#
# Templates may define a restart_command for `session restart`. If omitted,
# the regular command is used. This is useful for tools like Claude Code
# where --resume picks up the previous conversation.
#
# required_commands lists the executables the template's command needs. They
# are checked on the session's launch target (the agent, or the VM admin for
# admin sessions) BEFORE the session is created, so launching a "claude"
# session on an agent that doesn't have claude installed fails fast with a
# clear error instead of a cryptic tmux failure. required_commands are unioned
# during inheritance (parents + child, de-duplicated).
#
# env maps are merged during inheritance (child wins on key collision).

#[session_templates.default]               # override the built-in default
#command = "claude --name {{session_name}}"
#restart_command = "claude --resume {{session_name}}"
#required_commands = ["claude"]
#description = "Claude Code interactive session"

#[session_templates.claude]
#inherits = ["default"]
#command = "claude --name {{session_name}}"
#restart_command = "claude --resume {{session_name}}"
#required_commands = ["claude"]
#description = "Claude Code interactive session"

#[session_templates.default.env]
#CLAUDE_LOG_LEVEL = "info"

#[session_templates.custom-tool]
#command = "my-tool --flag"
#required_commands = ["my-tool"]
#description = "Custom tool"
#
#[session_templates.custom-tool.env]
#MY_VAR = "value"

# --- Session configuration ---
# Non-template session settings.

#[session.config]
#history_limit = 50000                     # tmux scrollback buffer lines per session

# =============================================================================
# Catalog extensions
# =============================================================================
#
# Operator-defined entries extend the built-in catalog. Entries with the same name
# as a built-in entry override it. Run `agw resource list --kind apt-package` (or
# apt-source / system-install-command / user-install-command) to see all available
# entries (built-in and operator-defined).

# --- Custom apt sources ---
# Third-party apt repositories.
# Use {arch} as a placeholder for the VM architecture (amd64 or arm64).

#[apt_sources.my-repo]
#description = "My internal apt repository"
#key_url = "https://apt.example.com/key.gpg"
#key_path = "/etc/apt/keyrings/my-repo.gpg"
#source = "deb [arch={arch} signed-by=/etc/apt/keyrings/my-repo.gpg] https://apt.example.com/debian bookworm main"
#source_file = "my-repo.list"

# --- Custom apt packages ---
# Named package sets with optional apt source dependencies.

#[apt_packages.my-tool]
#description = "My internal tool"
#apt_sources = ["my-repo"]
#apt = ["my-tool"]

# --- Custom system install commands ---
# Shell commands that install system-wide tooling (run during vm init/reinit).
# These may be re-run (e.g. during reinit) so they should be idempotent.
# Optional checks short-circuit installation if the tool is already present.
# Use only one of: test_exec, test_file, or test_dir.

#[system_install_commands.my-system-tool]
#description = "Custom system-wide tool"
#command = "curl -fsSL https://example.com/install.sh | sudo bash"
#test_exec = "my-system-tool"            # skip if command is on PATH

# --- Custom user install commands ---
# Shell commands that install per-user tooling (run for admin and agents).
# These may be re-run so they should be idempotent.
# Use only one of: test_exec, test_file, or test_dir.
# For test_file/test_dir, ~ resolves to the target user's home.

#[user_install_commands.my-tool]
#description = "Custom per-user tool"
#command = "curl -fsSL https://example.com/install.sh | bash"
#path = ["~/.my-tool/bin"]
#test_exec = "my-tool"                   # skip if command is on PATH
