# Agentworks configuration
# Copy to ~/.config/agentworks/config.toml and edit to match your setup.
#
# Required fields are uncommented. Everything else shows the default value
# commented out -- uncomment and change only what you need.

# --- User identity and preferences ---

[user]
ssh_public_key = "~/.ssh/id_ed25519.pub"    # required: used to authorize access to VMs
ssh_private_key = "~/.ssh/id_ed25519"        # required: used for SSH connections to VMs
# shell = "zsh"                              # default shell set on VMs
# ssh_config = "~/.ssh/config"               # SSH config file for VM host entries
# extra_ssh_public_keys = [                  # additional public keys for VM authorized_keys
#     "~/.ssh/other_key.pub",
# ]

# --- Paths ---

[paths]
# local_workspaces = "~/workspaces"            # local workspace directory
# code_workspaces = "~/agentworks-workspaces"  # .code-workspace file directory

# --- Default values for CLI flags ---

[defaults]
# platform = "lima"                          # lima, azure, or wsl2
# vm_host = "mac-studio"                     # default VM host for remote Lima
# git_credentials = ["github"]                # git credentials to configure on vm create

# --- Dotfiles ---

[dotfiles]
# enabled = true                             # copy dotfiles to VMs during init
# source = "~/.dotfiles"                     # path to your dotfiles repo
# install_cmd = "./install.sh"               # command to run after copying dotfiles

# --- VM configuration ---
# Agentworks always installs system dependencies (openssh-server, curl, git,
# sudo, ca-certificates, tmux, tmuxinator) regardless of this config.

[vm.config]
# vm_user = "agentworks"                     # username created on VMs
# cpus = 4                                   # number of CPUs (Lima)
# memory = 8                                 # memory in GiB (Lima)
# disk = 50                                  # disk size in GiB (Lima)
# azure_vm_size = "Standard_B2s"          # Azure VM size
# apt = [
#     "zsh",
#     "unzip",
#     "build-essential",
#     "ripgrep",
#     "fzf",
#     "fd-find",
# ]
# snap = []
# install_commands = ["bun", "claude"]       # references to [install_commands.*] sections

# --- Agent configuration ---
# Defaults for agent creation. Agents run install commands under their own
# shell, separate from the user's VM shell.

# [agent.config]
# install_commands = ["claude"]             # references to [install_commands.*] sections
# shell = "bash"                            # agent shell (default: bash)

# --- Install commands ---
# Named install commands referenced from vm.config.install_commands and
# agent.config.install_commands. VM commands run under the user's shell;
# agent commands run under the agent's shell. PATH additions are written
# to ~/.agentworks-path.sh (sourced from ~/.profile and ~/.zprofile) so
# they are available to all login shells.

# [install_commands.bun]
# command = "curl -fsSL https://bun.sh/install | bash"
# path = ["~/.bun/bin"]

# [install_commands.claude]
# command = "npm install -g @anthropic-ai/claude-code"
# path = ["~/.npm-global/bin"]

# --- Workspace templates ---
# The "default" template is used when --template is not specified.
# Templates support inheritance via the "inherits" key.
#
# Repo URLs: use HTTPS format for repos. The VM's git credential store
# provides authentication via personal access tokens configured during
# VM init. Public repos work without credentials.

# [workspace_templates.default]
# repo = "https://github.com/org/repo.git"  # git repo to clone into workspace
# tmuxinator = true                          # generate tmuxinator config
# inherits = []                              # list of parent template names

# [workspace_templates.myproject]
# repo = "https://github.com/org/myproject.git"
# tmuxinator = false
# inherits = ["default"]

# --- Git credentials ---
# Personal access tokens are prompted during VM init and stored via
# git credential-store on the VM.

# [git_credentials.github]
# type = "github"
# Token: create at https://github.com/settings/tokens (repo scope)

# [git_credentials.azdo]
# type = "azdo"
# org = "my-org"
# Token: create at https://dev.azure.com/{org}/_usersSettings/tokens

# --- Azure settings (only needed for --platform azure) ---

# [azure]
# subscription_id = "..."                    # required for azure platform
# resource_group = "agentworks-vms"          # required for azure platform
# region = "eastus2"                         # required for azure platform
# idle_timeout_hours = 2                     # auto-stop idle VMs after this many hours
