name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check agentworks/ tests/

      - name: Mypy
        run: uv run mypy agentworks/

      - name: Check typer isolation
        run: |
          # Business logic must not import typer -- use output module instead.
          # Allowed: cli.py (CLI layer), doctor.py (CLI layer), completions/ (CLI layer),
          # sessions/manager.py (raw data pipe, see comment in file).
          violations=$(grep -rnP '^\s*(import typer|from typer)' agentworks/ --include='*.py' \
            | grep -v '__pycache__' \
            | grep -v 'cli\.py' \
            | grep -v 'doctor\.py' \
            | grep -v 'completions/' \
            | grep -v 'sessions/manager\.py' \
            || true)
          if [ -n "$violations" ]; then
            echo "ERROR: typer imported in business logic (use agentworks.output instead):"
            echo "$violations"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pytest
        run: uv run pytest tests/ -v -m 'not integration'

  # Pinned npm-based linters. We invoke each tool directly via npx at the
  # version recorded in its `.<tool>-version` file, rather than going through
  # a third-party GitHub Action whose own dependency tree we cannot control.
  # `git ls-files` ensures only tracked files are scanned, mirroring what a
  # contributor sees locally on a clean checkout.

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: markdownlint
        run: |
          VERSION=$(cat .markdownlint-cli2-version)
          git ls-files '*.md' | xargs -r npx -y markdownlint-cli2@"$VERSION"

  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: cspell
        run: |
          VERSION=$(cat .cspell-version)
          git ls-files '*.md' '*.py' '*.yaml' '*.yml' '*.toml' \
            | xargs -r npx -y cspell@"$VERSION" --no-progress

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: prettier
        run: |
          VERSION=$(cat .prettier-version)
          git ls-files '*.md' | xargs -r npx -y prettier@"$VERSION" --check

  rulesync:
    # Verify the committed copilot output (.github/copilot-instructions.md
    # plus .github/instructions/, .github/agents/, .github/skills/) is up to
    # date with the .rulesync/ sources. CI runs without a rulesync.local.jsonc,
    # so the shared targets: ["copilot"] from rulesync.jsonc is what's checked.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check rulesync output is up to date
        run: |
          VERSION=$(cat .rulesync-version)
          npx -y rulesync@"$VERSION" generate --check
