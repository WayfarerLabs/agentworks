name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check agentworks/ tests/

      - name: Mypy
        run: uv run mypy agentworks/

      - name: Check typer isolation
        run: |
          # Business logic must not import typer; use the output module instead.
          # Allowed: cli/ package (CLI layer), completions/ (CLI layer),
          # sessions/manager.py (raw data pipe, see comment in file).
          violations=$(grep -rnP '^\s*(import typer|from typer)' agentworks/ --include='*.py' \
            | grep -v '__pycache__' \
            | grep -v 'agentworks/cli/' \
            | grep -v 'completions/' \
            | grep -v 'sessions/manager\.py' \
            || true)
          if [ -n "$violations" ]; then
            echo "ERROR: typer imported in business logic (use agentworks.output instead):"
            echo "$violations"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pytest
        run: uv run pytest tests/ -v -m 'not integration'

  # File-quality linters and the rulesync drift check both run via the same
  # scripts contributors use locally (./scripts/lint-files.sh, ./scripts/rulesync-upgen.sh
  # --check). That keeps CI and local behavior in lockstep; the version pins,
  # ignore lists, and exit semantics are defined exactly once.

  lint-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: ./scripts/lint-files.sh
        run: ./scripts/lint-files.sh

  rulesync-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: ./scripts/rulesync-upgen.sh --check
        run: ./scripts/rulesync-upgen.sh --check

  # Umbrella job: require this single check in branch protection on main.
  # Adding a new job to CI means adding it to `needs:` below, so the
  # required-checks list lives in the workflow file (alongside the jobs)
  # rather than in GitHub settings that can drift silently.
  ci-success:
    if: always()
    needs: [python-checks, test, lint-files, rulesync-drift]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
