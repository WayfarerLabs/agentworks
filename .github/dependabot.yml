# Dependabot configuration.
#
# Two ecosystems are covered:
#   - "uv" for the Python CLI package in cli/ (reads both cli/pyproject.toml
#     and cli/uv.lock; updates both in the same PR so CI's
#     `uv sync --frozen` passes without follow-up).
#   - "github-actions" for the workflows under .github/workflows/.
#
# commit-message blocks ensure Dependabot's PRs land as valid Conventional
# Commits (the repo enforces this via release-please).
#
# Major-version bumps for each are kept as standalone PRs because they
# usually need review (release notes, breaking changes); patches and
# minors are grouped to keep the PR queue manageable.
version: 2
updates:
  - package-ecosystem: uv
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope
    groups:
      python-patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-patch-and-minor:
        update-types:
          - patch
          - minor
