# Dependabot configuration.
#
# Two ecosystems are covered:
#   - "pip" for the Python CLI package in cli/ (reads cli/pyproject.toml,
#     cli/uv.lock, and groups patch + minor updates so the PR queue stays
#     manageable).
#   - "github-actions" for the workflows under .github/workflows/.
#
# Major-version bumps for each are kept as standalone PRs because they
# usually need review (release notes, breaking changes).
version: 2
updates:
  - package-ecosystem: pip
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    groups:
      actions-patch-and-minor:
        update-types:
          - patch
          - minor
