package:
  name: nx
  description: Nx workspace tools for building, testing, and inspecting projects
  skill_group: nx
  skill_intro: |
    These tools run Nx commands via npx. All tools require an nx.json file in
    the current directory (Nx workspace root). Use nx-show-projects to
    list all projects, nx-run to execute a target, and nx-affected to
    find projects affected by current changes.

tools:
  nx-show-projects:
    description: List all projects in the Nx workspace (one per line)
    command: [npx, nx, show, projects]
    guards:
      - command: [test, -f, nx.json]
        fail_message: Not in an Nx workspace root (nx.json not found). Run from the repo root.

  nx-show-project:
    description: Show configuration details for a specific Nx project (targets, source root, metadata)
    command: [npx, nx, show, project, "{{project}}"]
    args:
      project:
        description: Nx project name (from nx-show-projects)
        required: true
        pattern: "^[a-zA-Z0-9_-]+$"
    guards:
      - command: [test, -f, nx.json]
        fail_message: Not in an Nx workspace root (nx.json not found). Run from the repo root.

  nx-run:
    description: Run an Nx target on a project in project:target format (e.g. myapp:build)
    command: [npx, nx, run, "{{target}}"]
    args:
      target:
        description: "Target in project:target format (e.g. myapp:build, myapp:test, myapp:lint)"
        required: true
        pattern: "^[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+$"
    guards:
      - command: [test, -f, nx.json]
        fail_message: Not in an Nx workspace root (nx.json not found). Run from the repo root.

  nx-affected:
    description: List Nx projects affected by current changes compared to main
    command: [npx, nx, show, projects, --affected]
    guards:
      - command: [test, -f, nx.json]
        fail_message: Not in an Nx workspace root (nx.json not found). Run from the repo root.

  nx-graph:
    description: Print the Nx project dependency graph as JSON
    command: [npx, nx, graph, --print-affected]
    guards:
      - command: [test, -f, nx.json]
        fail_message: Not in an Nx workspace root (nx.json not found). Run from the repo root.

  nx-reset:
    description: Clear the Nx cache and reset the Nx daemon
    command: [npx, nx, reset]
    guards:
      - command: [test, -f, nx.json]
        fail_message: Not in an Nx workspace root (nx.json not found). Run from the repo root.
