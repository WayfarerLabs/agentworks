package:
  name: nerf-git
  description: Scoped git operations for agents
  skill_group: nerf-git
  skill_intro: |
    Use these tools instead of running git directly. They enforce safe defaults
    and prevent destructive operations such as force pushes or pushes to
    protected remotes. If you need an operation not covered here, ask your
    operator to grant access or define a new nerf tool.

    All tools operate on the current working directory's git repository.

tools:
  nerf-git-push-origin:
    description: Push the current branch to the origin remote
    command: [git, push, origin, HEAD]

  nerf-git-push-remote:
    description: Push the current branch to a non-origin remote
    command: [git, push, "{remote}", HEAD]
    flags:
      remote:
        description: Name of the remote to push to (not origin)
        pattern: "^[a-z0-9_-]+$"
        deny: [origin]

  nerf-git-fetch:
    description: Fetch from a remote (defaults to all tracked remotes if not specified)
    command: [git, fetch, "{remote}"]
    flags:
      remote:
        description: Name of the remote to fetch from
        optional: true
        pattern: "^[a-z0-9_-]+$"

  nerf-git-log:
    description: Show a short one-line log of recent commits
    command: [git, log, --oneline, --no-decorate, -20]
