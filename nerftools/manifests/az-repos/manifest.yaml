version: 1

package:
  name: az-repos
  description: Azure Repos tools for viewing and creating pull requests
  skill_group: az-repos
  skill_intro: |
    These tools interact with Azure Repos pull requests. The organization and
    project are auto-detected from the git remote. Use az-repos-pr-list to
    see open PRs, az-repos-pr-show to inspect a specific PR, and
    az-repos-pr-create to create a new PR from the current branch.

tools:
  az-repos-pr-list:
    description: List active pull requests in the project (most recent 10)
    threat:
      read: remote
      write: none
    template:
      command: [az, repos, pr, list, --status, active, --top, "10", --output, table]

  az-repos-pr-show:
    description: Show details for a specific pull request
    threat:
      read: remote
      write: none
    template:
      command: [az, repos, pr, show, --id, "{{arguments.pr_id}}", --output, table]
    arguments:
      pr_id:
        description: Pull request ID (numeric, from az-repos-pr-list)
        required: true
        pattern: "^[0-9]+$"

  az-repos-pr-create:
    description: >-
      Create a pull request from the current branch to the default target branch.
      Source branch is auto-detected from HEAD. Cannot be run from detached HEAD
      or from main.
    threat:
      read: remote
      write: remote
    template:
      command: [az, repos, pr, create, --title, "{{arguments.title}}", --description, "{{arguments.description}}", "{{switches.draft}}", --output, table]
    arguments:
      title:
        description: PR title
        required: true
      description:
        description: PR description (body text)
        required: true
    switches:
      draft:
        description: Create the PR as a draft
    guards:
      - command: [git, symbolic-ref, --quiet, HEAD]
        fail_message: Cannot create a PR from detached HEAD state. Check out a feature branch first.
      - script: |
          [ "$(git symbolic-ref --short HEAD 2>/dev/null)" != "main" ]
        fail_message: Cannot create a PR from main. Check out a feature branch first.
