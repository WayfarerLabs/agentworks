package:
  name: az-wi
  description: Azure Boards work item tools for viewing and commenting on work items
  skill_group: az-wi
  skill_intro: |
    These tools interact with Azure Boards work items. The organization and
    project are auto-detected from the git remote. The az-boards-wi-*
    tools operate on any work item. The az-boards-mywi-* tools are
    intended for work items assigned to you -- use them to comment on or
    view your own work.

tools:
  az-boards-wi-show:
    description: Show details and comments for any work item
    command: [az, boards, work-item, show, --id, "{{wi_id}}", --output, json]
    args:
      wi_id:
        description: Work item ID (numeric)
        required: true
        pattern: "^[0-9]+$"

  az-boards-wi-comment:
    description: Add a comment to any work item
    command: [az, boards, work-item, update, --id, "{{wi_id}}", --discussion, "{{comment}}", --output, none]
    args:
      wi_id:
        description: Work item ID (numeric)
        required: true
        pattern: "^[0-9]+$"
      comment:
        description: Comment text to add to the work item
        required: true

  az-boards-mywi-show:
    description: Show details and comments for a work item assigned to you
    command: [az, boards, work-item, show, --id, "{{wi_id}}", --output, json]
    args:
      wi_id:
        description: Work item ID (numeric, must be assigned to you)
        required: true
        pattern: "^[0-9]+$"

  az-boards-mywi-comment:
    description: Add a comment to a work item assigned to you
    command: [az, boards, work-item, update, --id, "{{wi_id}}", --discussion, "{{comment}}", --output, none]
    args:
      wi_id:
        description: Work item ID (numeric, must be assigned to you)
        required: true
        pattern: "^[0-9]+$"
      comment:
        description: Comment text to add to the work item
        required: true
